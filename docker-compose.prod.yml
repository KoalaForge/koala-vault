version: '3.8'

services:
  app:
    container_name: KoalaVault
    image: koala-vault:latest
    build:
      context: .
      target: production
    ports:
      - "3008:3008"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:' + (process.env.PORT||3000) + '/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
